<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>主线小说 — 无限理想乡</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;500&family=Share+Tech+Mono&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">

  <style>
    /* ═══════════════════════════════════════════
       novel.html 专属样式
    ═══════════════════════════════════════════ */

    /* ── 页面头部（小号 Hero） ── */
    .page-header {
      position: relative; z-index: 2;
      padding: 96px 52px 40px;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    .page-header::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 60% 80% at 80% 50%,
        rgba(37,99,168,.10) 0%, transparent 70%);
    }

    /* 标题区 */
    .ph-inner { max-width: 720px; position: relative; }
    /* ── 导航当前页荧光金色高亮 ── */
    .nav-active {
      color: #9EF0FF !important;
      text-shadow: 0 0 10px rgba(196,154,46,0.7), 0 0 20px rgba(212,174,82,0.3);
    }
    .nav-active::after {
      background: #9EF0FF !important;
      box-shadow: 0 0 6px rgba(158,240,255,0.8) !important;
    }

    /* 标题区 */
    .ph-label {
      font-family: 'Share Tech Mono', monospace; font-size: 10px;
      letter-spacing: .35em; color: var(--cyan); margin-bottom: 16px;
      display: flex; align-items: center; gap: 12px;
      opacity: 0; animation: fadeUp .5s .1s forwards;
    }
    .ph-label::before { content: ''; display: block; width: 28px; height: 1px; background: var(--cyan); }

    .ph-title {
      font-family: 'Noto Serif SC', serif; font-weight: 300;
      font-size: clamp(32px, 4vw, 54px); line-height: 1.2;
      letter-spacing: .06em; margin-bottom: 20px;
      opacity: 0; animation: fadeUp .6s .15s forwards;
    }
    .ph-title em {
      font-style: normal;
      background: linear-gradient(135deg, var(--blue3), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .ph-synopsis {
      font-size: 14px; line-height: 2; color: var(--text2);
      max-width: 580px; margin-bottom: 36px;
      border-left: 2px solid var(--blue0); padding-left: 18px;
      opacity: 0; animation: fadeUp .6s .2s forwards;
    }

    /* 统计条 */
    .ph-stats {
      display: flex; gap: 0; flex-wrap: wrap;
      border: 1px solid var(--border); background: rgba(10,21,37,.5);
      opacity: 0; animation: fadeUp .6s .25s forwards;
    }
    .ph-stat {
      padding: 14px 28px; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 4px;
    }
    .ph-stat:last-child { border-right: none; }
    .ph-stat-label { font-family: 'Noto Sans SC', sans-serif; font-size: 11px; color: var(--text3); }
    .ph-stat-val   { font-family: 'Share Tech Mono', monospace; font-size: 18px; color: var(--blue3); }
    .ph-stat-val.live { color: var(--cyan); }

    /* ── 章节列表 ── */
    .chapter-section {
      position: relative; z-index: 2;
      padding: 64px 48px 80px;
    }

    .ch-list { display: flex; flex-direction: column; gap: 1px; }

    .ch-card {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 0;
      background: var(--border);
      text-decoration: none; color: inherit;
      transition: background .2s;
    }
    .ch-card:hover .ch-card-num  { background: var(--bg3); }
    .ch-card:hover .ch-card-body { background: var(--bg2); }
    .ch-card:hover .ch-card-action { background: var(--bg2); }

    /* 左侧章节序号 */
    .ch-card-num {
      background: var(--bg1);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 28px 0;
      border-right: 1px solid var(--border);
      transition: background .2s;
    }
    .ch-num-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px; color: var(--text3);
      letter-spacing: .15em; margin-bottom: 4px;
    }
    .ch-num-val {
      font-family: 'Cinzel', serif;
      font-size: 22px; color: var(--blue2);
      line-height: 1;
    }

    /* 中部内容 */
    .ch-card-body {
      background: var(--bg1);
      padding: 24px 32px;
      transition: background .2s;
    }
    .ch-card-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px; color: var(--text);
      margin-bottom: 8px;
    }
    .ch-card-synopsis {
      font-size: 13px; line-height: 1.8;
      color: var(--text2); font-style: italic;
      margin-bottom: 14px;
    }
    .ch-card-meta {
      display: flex; gap: 20px; align-items: center;
    }
    .ch-meta-item {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 11px; color: var(--text3);
      display: flex; align-items: center; gap: 5px;
    }
    .ch-meta-item em {
      font-style: normal; color: var(--blue3);
    }
    .ch-wordcount {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; color: var(--text3);
    }
    .ch-wordcount em { color: var(--cyan); font-style: normal; }

    /* 右侧操作 */
    .ch-card-action {
      background: var(--bg1);
      border-left: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      padding: 0 28px;
      transition: background .2s;
    }
    .ch-read-btn {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 12px; color: var(--text3);
      display: flex; align-items: center; gap: 6px;
      transition: color .2s;
    }
    .ch-card:hover .ch-read-btn { color: var(--cyan); }
    .ch-read-arrow {
      font-size: 16px; transition: transform .2s;
    }
    .ch-card:hover .ch-read-arrow { transform: translateX(3px); }

    /* 加载占位 */
    .ch-loading {
      text-align: center; padding: 60px;
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 13px; color: var(--text3);
    }

    /* 入场动画 + 扫光结构 */
    .ch-card {
      opacity: 0;
      transform: translateY(12px);
      transition: opacity .4s, transform .4s, background .2s;
      position: relative;
      overflow: hidden;
    }
    .ch-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* 底部扫光线 */
    .ch-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 1px;
      background: #D4AE52;
      box-shadow: 0 0 8px rgba(196,154,46,0.85), 0 0 18px rgba(212,174,82,0.4);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ch-card:hover::after { transform: scaleX(1); }

  </style>
</head>
<body>

  <!-- ═══════════ 几何光标 ═══════════ -->
  <div id="cursor-container">
    <svg id="cur-ring" viewBox="0 0 50 50">
      <g fill="none" stroke="var(--cyan)" stroke-width="1.5" stroke-linecap="round">
        <path d="M 25 5 L 19 15 M 25 5 L 31 15" />
        <path d="M 7 36 L 13 26 M 7 36 L 19 36" />
        <path d="M 43 36 L 37 26 M 43 36 L 31 36" />
      </g>
    </svg>
    <svg id="cur" viewBox="0 0 50 50">
      <g fill="none" stroke="var(--cyan)" stroke-width="2" stroke-linecap="round">
        <path d="M 25 36 L 25 26" />
        <path d="M 16 20.5 L 25 26" />
        <path d="M 34 20.5 L 25 26" />
        <circle cx="25" cy="26" r="1" fill="var(--cyan)" stroke="none" />
      </g>
    </svg>
  </div>

  <!-- ═══════════ 导航栏 ═══════════ -->
  <nav>
    <a href="index.html" class="nav-logo">
      <span class="nav-logo-main">无限理想乡</span>
      <span class="nav-logo-sub">Creative Universe</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html" class="nav-active">深度重置</a></li>
      <li><a href="stories.html">衍生故事</a></li>
      <li><a href="index.html#gallery">插画</a></li>
      <li><a href="index.html#world">世界观</a></li>
    </ul>
    <div class="nav-status">连载中</div>
  </nav>

  <!-- ═══════════ 页面头部 ═══════════ -->
  <header class="page-header">
    <div class="ph-inner">
      <div class="ph-label">MAIN NOVEL · 主线小说</div>
      <h1 class="ph-title" id="novel-title"><em>《潜渊之旅》</em></h1>
      <p class="ph-synopsis" id="novel-synopsis">载入中…</p>
      <div class="ph-stats">
        <div class="ph-stat">
          <span class="ph-stat-label">连载状态</span>
          <span class="ph-stat-val live" id="stat-status">连载中</span>
        </div>
        <div class="ph-stat">
          <span class="ph-stat-label">已更新章节</span>
          <span class="ph-stat-val" id="stat-chapters">— 章</span>
        </div>
        <div class="ph-stat">
          <span class="ph-stat-label">累计字数</span>
          <span class="ph-stat-val" id="stat-words">计算中…</span>
        </div>
        <div class="ph-stat">
          <span class="ph-stat-label">最近更新</span>
          <span class="ph-stat-val" id="stat-update">——</span>
        </div>
        <!-- <div class="ph-stat">
          <span class="ph-stat-label">类型</span>
          <span class="ph-stat-val" id="stat-genre">——</span>
        </div> -->
      </div>
    </div>
  </header>

  <!-- ═══════════ 章节列表 ═══════════ -->
  <section class="chapter-section">
    <div class="sec-head">
      <span class="sec-label">章节目录</span>
      <div class="sec-line"></div>
      <span class="sec-num">CHAPTERS</span>
    </div>
    <div class="ch-list" id="chapter-list">
      <div class="ch-loading">载入章节列表中…</div>
    </div>
  </section>

  <!-- ═══════════ 页脚 ═══════════ -->
  <footer>
    <div class="footer-logo">无限理想乡</div>
    <div class="footer-info">© 2026 · <em>vigill357</em> · 保留所有权利</div>
    <div class="footer-info" id="footer-update">最近更新 · <em>——</em></div>
  </footer>

  <!-- ═══════════ 脚本 ═══════════ -->
  <script src="js/cursor.js"></script>
  <script>
    (() => {
      const STORIES_ROOT = 'data/main_stories/';

      /** 统计中文字符数 */
      function countChinese(text) {
        return (text.match(/[\u4e00-\u9fa5]/g) || []).length;
      }

      /** 格式化字数 */
      function fmtWords(n) {
        if (n >= 10000) return (n / 10000).toFixed(1) + ' 万字';
        return n.toLocaleString() + ' 字';
      }

      /** 格式化序号（补零） */
      function fmtNum(n) {
        return String(n).padStart(2, '0');
      }

      /** 渲染单张章节卡片 */
      function renderCard(meta, index, wordCount, folder) {
        const card = document.createElement('a');
        card.href      = `reader.html?ch=${folder || ''}`; // 未来指向阅读器
        card.className = 'ch-card';
        card.id        = `ch${index + 1}`;

        card.innerHTML = `
          <div class="ch-card-num">
            <span class="ch-num-label">CH</span>
            <span class="ch-num-val">${fmtNum(index + 1)}</span>
          </div>
          <div class="ch-card-body">
            <div class="ch-card-title">${meta.title}</div>
            <p class="ch-card-synopsis">${meta.synopsis || '暂无简介。'}</p>
            <div class="ch-card-meta">
              <span class="ch-meta-item">更新于 <em>${meta.date || '——'}</em></span>
              <span class="ch-wordcount">
                ${wordCount !== null
                  ? `<em>${fmtWords(wordCount)}</em>`
                  : '<em>——</em>'}
              </span>
            </div>
          </div>
          <div class="ch-card-action">
            <span class="ch-read-btn">
              阅读
              <span class="ch-read-arrow">›</span>
            </span>
          </div>`;

        return card;
      }

      /** 主加载流程 */
      async function load() {
        // 1. 读小说级别信息
        try {
          const wRes  = await fetch('data/world.json');
          const world = await wRes.json();
          if (world.novel) {
            const n = world.novel;
            document.getElementById('novel-title').innerHTML    = `<em>${n.title || '《主线小说标题》'}</em>`;
            document.getElementById('novel-synopsis').textContent = n.synopsis || '';
            document.getElementById('stat-status').textContent    = n.status  || '——';
            document.getElementById('stat-genre').textContent     = n.genre   || '——';
          }

        } catch (_) {}

        // 2. 读章节索引
        let folders = [];
        try {
          const idxRes = await fetch(STORIES_ROOT + 'index.json');
          folders = await idxRes.json();
        } catch (e) {
          document.getElementById('chapter-list').innerHTML =
            '<div class="ch-loading">无法加载章节列表。</div>';
          return;
        }

        document.getElementById('stat-chapters').textContent = `${folders.length} 章`;

        // 3. 并行拉取所有 meta.json
        const metas = await Promise.all(
          folders.map(f =>
            fetch(`${STORIES_ROOT}${f}/meta.json`)
              .then(r => r.json())
              .catch(() => ({ title: f, date: '', synopsis: '' }))
          )
        );

        // 最新更新日期
        const latestDate = [...metas]
          .sort((a, b) => (b.date || '').localeCompare(a.date || ''))[0]?.date || '——';
        document.getElementById('stat-update').textContent = latestDate;
        document.getElementById('footer-update').innerHTML =
          `最近更新 · <em>${latestDate}</em>`;

        // 4. 渲染卡片（先不带字数）
        const list = document.getElementById('chapter-list');
        list.innerHTML = '';
        const cards = metas.map((meta, i) => {
          const card = renderCard(meta, i, null, folders[i]);
          list.appendChild(card);
          return card;
        });

        // 5. 入场动画（逐卡延迟）
        cards.forEach((card, i) => {
          setTimeout(() => card.classList.add('visible'), i * 80);
        });

        // 6. 并行拉取正文 → 计算字数（异步更新到已渲染的卡片）
        let totalWords = 0;
        await Promise.all(
          folders.map(async (f, i) => {
            try {
              const txtRes = await fetch(`${STORIES_ROOT}${f}/${f}.txt`);
              const text   = await txtRes.text();
              const wc     = countChinese(text);
              totalWords  += wc;

              // 更新对应卡片的字数显示
              const wcEl = cards[i].querySelector('.ch-wordcount');
              if (wcEl) wcEl.innerHTML = `<em>${fmtWords(wc)}</em>`;

              // 同步更新总字数
              document.getElementById('stat-words').textContent = fmtWords(totalWords);
            } catch (_) {}
          })
        );

        // 最终确认总字数
        document.getElementById('stat-words').textContent =
          totalWords > 0 ? fmtWords(totalWords) : '——';
      }

      // 光标初始化 + 主加载
      document.addEventListener('DOMContentLoaded', () => {
        Cursor.init();
        load();
      });
    })();
  </script>
</body>
</html>
