<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>深潜 · 无限理想乡</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400&family=Share+Tech+Mono&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">

  <style>
    /* ── 基础变量（与 main.css 保持一致）────────────── */
    :root {
      --bg0:       #060C18;
      --bg1:       #0A1525;
      --gold:      #C49A2E;
      --gold-lt:   #D4AE52;
      --gold-dim:  rgba(196, 154, 46, 0.55);
      --gold-bg:   rgba(196, 154, 46, 0.07);
      --gold-line: rgba(196, 154, 46, 0.22);
      --blue:      #4A90D9;
      --blue-lt:   #7BB8F0;
      --cyan:      #5BC8E8;
      --text:      #C8D8EE;
      --text2:     #A0BACE;
      --text3:     #6A90B0;
      --border:    rgba(74, 144, 217, 0.14);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg0);
      color: var(--text);
      font-family: 'Noto Sans SC', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── 覆盖 main.css 全局网格纹理 ─────────────────── */
    body::before { display: none; }

    /* ════════════════════════════════════════════════
       NAV
    ════════════════════════════════════════════════ */

    .r-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: stretch;
      height: 48px;
      background: rgba(6, 12, 24, 0.88);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .r-nav-brand {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.16em;
      color: var(--gold);
      padding: 0 20px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
    }

    .r-nav-cmds {
      display: flex;
      align-items: stretch;
      flex: 1;
    }

    .r-nav-cmd {
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 13px;
      color: var(--text2);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color 0.25s, background 0.25s;
      white-space: nowrap;
      text-decoration: none;
    }

    /* 底部金线动画 */
    .r-nav-cmd::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .r-nav-cmd:hover {
      color: var(--gold-lt);
      background: var(--gold-bg);
    }
    .r-nav-cmd:hover::after { transform: scaleX(1); }

    .r-nav-cmd.disabled {
      opacity: 0.28;
      pointer-events: none;
      cursor: default;
    }

    /* 右侧进度区 */
    .r-nav-progress {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      margin-left: auto;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
    }

    .r-prog-bar {
      width: 60px;
      height: 2px;
      background: rgba(74, 144, 217, 0.14);
      border-radius: 1px;
      overflow: hidden;
    }

    .r-prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      border-radius: 1px;
      transition: width 0.4s;
      width: 0%;
    }

    .r-prog-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text3);
      white-space: nowrap;
    }

    /* ════════════════════════════════════════════════
       SPLASH — 扉页
    ════════════════════════════════════════════════ */

    .r-splash {
      position: relative;
      height: calc(100vh - 48px);   /* 精确占满首屏，不溢出 */
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* 金色几何背景 */
    .r-splash-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .r-splash-inner {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr 40%;  /* 插画列加宽至 40% */
      height: 100%;                    /* 填满扉页高度 */
    }

    /* ── 扉页左侧：信息区 ── */

    .r-splash-info {
      padding: 44px 36px 38px 52px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    .r-eyebrow {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.22em;
      color: var(--gold-dim);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .r-eyebrow::before {
      content: '';
      width: 20px;
      height: 1px;
      background: var(--gold-dim);
    }

    .r-ch-num {
      font-family: 'Share Tech Mono', monospace;
      font-size: 64px;               /* 84px → 64px，减少压迫感 */
      line-height: 1;
      color: rgba(196, 154, 46, 0.08);
      letter-spacing: -0.02em;
      margin-bottom: -8px;
      user-select: none;
    }

    .r-ch-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 26px;               /* 30px → 26px */
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.1em;
      line-height: 1.45;
      margin-bottom: 20px;
    }

    .r-divider {
      width: 36px;
      height: 1px;
      background: var(--gold-dim);
      margin-bottom: 18px;
      opacity: 0.75;
    }

    .r-synopsis {
      font-family: 'Noto Serif SC', serif;
      font-size: 14px;               /* 15px → 14px */
      line-height: 2.0;
      color: var(--text2);
      max-width: 400px;
      margin-bottom: 24px;
    }

    .r-meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 28px;
    }

    .r-meta-item { display: flex; flex-direction: column; gap: 5px; }

    .r-meta-key {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--gold-dim);
    }

    .r-meta-val {
      font-size: 13.5px;
      color: var(--text);
    }

    /* 深潜按钮 */
    .r-dive-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 13px 32px;
      border: 1px solid var(--gold-line);
      background: var(--gold-bg);
      cursor: pointer;
      width: fit-content;
      position: relative;
      overflow: hidden;
      transition: background 0.25s, border-color 0.25s;
    }

    .r-dive-btn::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .r-dive-btn:hover {
      background: rgba(196, 154, 46, 0.12);
      border-color: rgba(196, 154, 46, 0.42);
    }
    .r-dive-btn:hover::after { transform: scaleX(1); }

    .r-dive-btn span {
      font-family: 'Noto Serif SC', serif;
      font-size: 15px;
      color: var(--text);
      letter-spacing: 0.55em;
      padding-left: 0.55em;
    }

    /* ── 扉页右侧：插画区 ── */

    .r-splash-illus {
      border-left: 1px solid var(--border);
      background: rgba(8, 16, 30, 0.35);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .r-illus-frame {
      flex: 1;
      min-height: 0;                 /* flex 子项必须显式允许收缩 */
      padding: 28px 24px 16px;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    /* 插画图片：铺满列高 */
    .r-illus-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border: 1px solid rgba(196, 154, 46, 0.15);
      display: block;
    }

    /* 无插画时的占位：铺满列高 */
    .r-illus-placeholder {
      width: 100%;
      height: 100%;
      border: 1px solid rgba(196, 154, 46, 0.13);
      background: linear-gradient(160deg, #111e30 0%, #0a1422 55%, #0e1a28 100%);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .r-illus-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 35%, rgba(74,144,217,0.1) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 75%, rgba(196,154,46,0.05) 0%, transparent 40%);
    }

    .r-illus-gem-outer,
    .r-illus-gem-inner {
      position: absolute;
      border: 1px solid rgba(196, 154, 46, 0.14);
      transform: rotate(45deg);
    }
    .r-illus-gem-outer { width: 80px; height: 80px; top: calc(30% - 40px); left: calc(50% - 40px); }
    .r-illus-gem-inner { width: 52px; height: 52px; top: calc(30% - 26px); left: calc(50% - 26px); border-color: rgba(196,154,46,0.22); }

    .r-illus-corner {
      position: absolute;
      width: 10px; height: 10px;
      border-color: rgba(196, 154, 46, 0.24);
      border-style: solid;
    }
    .r-illus-corner.tl { top: 8px; left: 8px;  border-width: 1px 0 0 1px; }
    .r-illus-corner.tr { top: 8px; right: 8px; border-width: 1px 1px 0 0; }
    .r-illus-corner.bl { bottom: 8px; left: 8px;  border-width: 0 0 1px 1px; }
    .r-illus-corner.br { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }

    .r-illus-tag {
      position: absolute;
      bottom: 12px; left: 0; right: 0;
      text-align: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      color: rgba(196, 154, 46, 0.32);
    }

    /* 插画说明 */
    .r-illus-caption {
      padding: 14px 24px;
      border-top: 1px solid var(--border);
      background: rgba(6, 12, 24, 0.45);
      flex-shrink: 0;
    }

    .r-illus-cap-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 5px;
    }

    .r-illus-cap-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.11em;
      color: var(--gold-dim);
    }

    /* 向下滚动提示 */
    .r-scroll-hint {
      position: absolute;
      bottom: 20px;
      left: 52px;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 9px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.16em;
      color: rgba(196, 154, 46, 0.38);
      animation: hintPulse 2.8s ease-in-out infinite;
    }

    @keyframes hintPulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 0.9; }
    }

    .r-scroll-dots {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .r-scroll-dots span {
      display: block;
      width: 1px;
      height: 5px;
      background: var(--gold);
    }
    .r-scroll-dots span:nth-child(1) { opacity: 0.3; }
    .r-scroll-dots span:nth-child(2) { opacity: 0.6; }
    .r-scroll-dots span:nth-child(3) { opacity: 1; }

    /* ════════════════════════════════════════════════
       READING SECTION — 正文
    ════════════════════════════════════════════════ */

    .r-content {
      position: relative;
      background: var(--bg0);
    }

    /* 扫描线（保留，移除网格） */
    .r-content::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0, 0, 0, 0.05) 3px,
        rgba(0, 0, 0, 0.05) 4px
      );
      pointer-events: none;
    }

    /* 正文顶部章节标记 */
    .r-content-header {
      position: relative;
      z-index: 1;
      max-width: 660px;
      margin: 0 auto;
      padding: 56px 40px 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .r-content-num {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--text3);
      margin-bottom: 6px;
    }

    .r-content-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 17px;
      font-weight: 400;
      color: var(--text2);
      letter-spacing: 0.08em;
      margin-bottom: 28px;
    }

    .r-content-sep {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 44px;
    }

    .r-sep-line { flex: 1; height: 1px; background: var(--border); }
    .r-sep-gem  {
      width: 6px; height: 6px;
      border: 1px solid rgba(74,144,217,0.4);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* 正文文字区域 */
    .r-text-body {
      position: relative;
      z-index: 1;
      max-width: 660px;
      margin: 0 auto;
      padding: 0 40px;
    }

    /* ── 正文底部导航 ── */

    .r-footer {
      position: relative;
      z-index: 1;
      max-width: 660px;
      margin: 64px auto 0;
      padding: 0 40px 56px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
    }

    .r-footer-btn {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 15px 18px;
      border: 1px solid var(--border);
      background: rgba(10, 21, 37, 0.5);
      cursor: pointer;
      transition: border-color 0.22s, background 0.22s;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }

    .r-footer-btn::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .r-footer-btn:hover {
      border-color: rgba(196, 154, 46, 0.32);
      background: rgba(196, 154, 46, 0.05);
    }
    .r-footer-btn:hover::after { transform: scaleX(1); }
    .r-footer-btn.disabled { opacity: 0.28; pointer-events: none; }
    .r-footer-btn.next { text-align: right; }
    .r-footer-btn.next::after { transform-origin: right; }

    .r-fb-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      color: var(--text3);
    }

    .r-fb-title {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 13px;
      color: var(--text2);
    }

    .r-footer-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
    }

    .r-fc-gem {
      width: 8px; height: 8px;
      border: 1px solid rgba(74,144,217,0.38);
      transform: rotate(45deg);
    }

    .r-fc-pos {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--text3);
    }

    /* ════════════════════════════════════════════════
       加载 / 错误状态
    ════════════════════════════════════════════════ */

    .r-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 48px);
      gap: 16px;
    }

    .r-loading-gem {
      width: 20px; height: 20px;
      border: 1px solid var(--gold-dim);
      transform: rotate(45deg);
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(225deg); }
    }

    .r-loading-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--text3);
    }

    .r-error {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 48px);
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.12em;
      color: rgba(224, 92, 92, 0.7);
    }
  </style>
</head>

<body>
  <!-- ═══════════ 几何光标 ═══════════ -->
  <div id="cursor-container">
    <svg id="cur-ring" viewBox="0 0 50 50">
      <g fill="none" stroke="var(--cyan)" stroke-width="1.5" stroke-linecap="round">
        <path d="M 25 5 L 19 15 M 25 5 L 31 15" />
        <path d="M 7 36 L 13 26 M 7 36 L 19 36" />
        <path d="M 43 36 L 37 26 M 43 36 L 31 36" />
      </g>
    </svg>
    <svg id="cur" viewBox="0 0 50 50">
      <g fill="none" stroke="var(--cyan)" stroke-width="2" stroke-linecap="round">
        <path d="M 25 36 L 25 26" />
        <path d="M 16 20.5 L 25 26" />
        <path d="M 34 20.5 L 25 26" />
        <circle cx="25" cy="26" r="1" fill="var(--cyan)" stroke="none" />
      </g>
    </svg>
  </div>

  <!-- ── 顶部导航 ────────────────────────────────── -->
  <nav class="r-nav">
    <div class="r-nav-brand">INFINITE UTOPIA</div>
    <div class="r-nav-cmds">
      <a class="r-nav-cmd" id="nav-reset"  href="index.html">深度重置</a>
      <a class="r-nav-cmd" id="nav-anchor" href="novel.html">返回锚点</a>
      <a class="r-nav-cmd disabled" id="nav-up">深度上升</a>
      <a class="r-nav-cmd" id="nav-down">深度下降</a>
    </div>
    <div class="r-nav-progress">
      <div class="r-prog-bar"><div class="r-prog-fill" id="prog-fill"></div></div>
      <span class="r-prog-label" id="prog-label">—</span>
    </div>
  </nav>

  <!-- ── 主体：加载中状态 ────────────────────────── -->
  <div class="r-loading" id="r-loading">
    <div class="r-loading-gem"></div>
    <div class="r-loading-text">LOADING CHAPTER</div>
  </div>

  <!-- ── 扉页（JS 渲染后显示）────────────────────── -->
  <section class="r-splash" id="r-splash" style="display:none;">

    <!-- 金色几何背景 SVG -->
    <div class="r-splash-bg" aria-hidden="true">
      <svg width="100%" height="100%" viewBox="0 0 1000 700"
           preserveAspectRatio="xMidYMid slice"
           xmlns="http://www.w3.org/2000/svg">
        <!-- 顶部：极淡 -->
        <rect x="80"  y="28"  width="14" height="14" fill="none" stroke="#C49A2E" stroke-width=".5" opacity=".05" transform="rotate(45 87 35)"/>
        <rect x="880" y="20"  width="10" height="10" fill="none" stroke="#C49A2E" stroke-width=".5" opacity=".04" transform="rotate(45 885 25)"/>
        <line x1="230" y1="16" x2="280" y2="16" stroke="#C49A2E" stroke-width=".5" opacity=".05"/>
        <line x1="720" y1="30" x2="760" y2="30" stroke="#C49A2E" stroke-width=".5" opacity=".04"/>
        <circle cx="500" cy="20" r="2.5" fill="none" stroke="#C49A2E" stroke-width=".4" opacity=".05"/>
        <!-- 上中：稍显 -->
        <rect x="40"  y="155" width="18" height="18" fill="none" stroke="#C49A2E" stroke-width=".65" opacity=".09" transform="rotate(45 49 164)"/>
        <rect x="930" y="135" width="22" height="22" fill="none" stroke="#C49A2E" stroke-width=".65" opacity=".08" transform="rotate(45 941 146)"/>
        <line x1="120" y1="195" x2="180" y2="195" stroke="#C49A2E" stroke-width=".55" opacity=".09"/>
        <line x1="800" y1="170" x2="855" y2="170" stroke="#C49A2E" stroke-width=".55" opacity=".08"/>
        <rect x="440" y="110" width="12" height="12" fill="none" stroke="#C49A2E" stroke-width=".5" opacity=".07" transform="rotate(45 446 116)"/>
        <circle cx="620" cy="160" r="3" fill="none" stroke="#C49A2E" stroke-width=".5" opacity=".08"/>
        <!-- 中部：渐显 -->
        <rect x="20"  y="300" width="26" height="26" fill="none" stroke="#C49A2E" stroke-width=".8" opacity=".13" transform="rotate(45 33 313)"/>
        <rect x="920" y="280" width="30" height="30" fill="none" stroke="#C49A2E" stroke-width=".8" opacity=".12" transform="rotate(45 935 295)"/>
        <line x1="80"  y1="345" x2="160" y2="345" stroke="#C49A2E" stroke-width=".65" opacity=".12"/>
        <line x1="810" y1="320" x2="885" y2="320" stroke="#C49A2E" stroke-width=".65" opacity=".11"/>
        <rect x="470" y="260" width="16" height="16" fill="none" stroke="#C49A2E" stroke-width=".6" opacity=".10" transform="rotate(45 478 268)"/>
        <circle cx="250" cy="310" r="4" fill="none" stroke="#C49A2E" stroke-width=".55" opacity=".11"/>
        <circle cx="740" cy="290" r="3.5" fill="none" stroke="#C49A2E" stroke-width=".55" opacity=".10"/>

    </div>

    <div class="r-splash-inner">

      <!-- 左侧信息 -->
      <div class="r-splash-info">
        <div>
          <div class="r-eyebrow">CHAPTER LOG</div>
          <div class="r-ch-num" id="sp-num">—</div>
          <div class="r-ch-title" id="sp-title">—</div>
          <div class="r-divider"></div>
          <div class="r-synopsis" id="sp-synopsis"></div>
          <div class="r-meta-grid" id="sp-meta"></div>
        </div>
        <button class="r-dive-btn" id="btn-dive" onclick="diveIn()">
          <span>深潜</span>
        </button>
      </div>

      <!-- 右侧插画 -->
      <div class="r-splash-illus">
        <div class="r-illus-frame" id="illus-frame"></div>
        <div class="r-illus-caption" id="illus-caption" style="display:none;">
          <div class="r-illus-cap-title" id="illus-cap-title"></div>
          <div class="r-illus-cap-tag" id="illus-cap-tag"></div>
        </div>
      </div>

    </div>

    <!-- 向下提示 -->
    <div class="r-scroll-hint" aria-hidden="true">
      <div class="r-scroll-dots">
        <span></span><span></span><span></span>
      </div>
      SCROLL TO READ
    </div>

  </section>

  <!-- ── 正文区（JS 渲染后显示）──────────────────── -->
  <section class="r-content" id="r-content" style="display:none;">

    <div class="r-content-header">
      <div class="r-content-num" id="ct-num"></div>
      <div class="r-content-title" id="ct-title"></div>
      <div class="r-content-sep">
        <div class="r-sep-line"></div>
        <div class="r-sep-gem"></div>
        <div class="r-sep-line"></div>
      </div>
    </div>

    <div class="r-text-body" id="r-text-body"></div>

    <div class="r-footer">
      <a class="r-footer-btn prev disabled" id="foot-prev">
        <span class="r-fb-label">↑ 深度上升</span>
        <span class="r-fb-title" id="foot-prev-title">—</span>
      </a>
      <div class="r-footer-center">
        <div class="r-fc-gem"></div>
        <div class="r-fc-pos" id="foot-pos">— / —</div>
      </div>
      <a class="r-footer-btn next disabled" id="foot-next">
        <span class="r-fb-label">深度下降 ↓</span>
        <span class="r-fb-title" id="foot-next-title">—</span>
      </a>
    </div>

  </section>

  <!-- ── 脚本 ────────────────────────────────────── -->
  <script src="js/cursor.js"></script>
  <script src="js/markup.js"></script>
  <script>
  (() => {
    const ROOT = 'data/main_stories/';

    /* ── 工具函数 ──────────────────────────────── */

    function getParam(key) {
      return new URLSearchParams(location.search).get(key) || '';
    }

    function countChars(text) {
      return (text.match(/[\u4e00-\u9fa5]/g) || []).length;
    }

    function fmtWords(n) {
      return n >= 10000
        ? (n / 10000).toFixed(1) + ' 万字'
        : n + ' 字';
    }

    function zeroPad(n) {
      return String(n).padStart(3, '0');
    }

    function metaItem(key, val) {
      return `<div class="r-meta-item">
        <span class="r-meta-key">${key}</span>
        <span class="r-meta-val">${val}</span>
      </div>`;
    }

    /* ── 插画渲染 ──────────────────────────────── */

    function renderIllus(folder, meta) {
      const frame = document.getElementById('illus-frame');

      if (meta.illus) {
        const img = document.createElement('img');
        img.className = 'r-illus-img';
        img.alt = meta.illusCaption || meta.title || '';
        img.src = `${ROOT}${folder}/${meta.illus}`;
        img.onerror = () => { img.replaceWith(makePlaceholder(folder)); };
        frame.appendChild(img);
      } else {
        frame.appendChild(makePlaceholder(folder));
      }

      if (meta.illusCaption || meta.illusTag) {
        const cap = document.getElementById('illus-caption');
        cap.style.display = '';
        document.getElementById('illus-cap-title').textContent = meta.illusCaption || '';
        document.getElementById('illus-cap-tag').textContent   = meta.illusTag    || '';
      }
    }

    function makePlaceholder(folder) {
      const div = document.createElement('div');
      div.className = 'r-illus-placeholder';
      div.innerHTML = `
        <div class="r-illus-gem-outer"></div>
        <div class="r-illus-gem-inner"></div>
        <div class="r-illus-corner tl"></div>
        <div class="r-illus-corner tr"></div>
        <div class="r-illus-corner bl"></div>
        <div class="r-illus-corner br"></div>
        <div class="r-illus-tag">ILLUS · ${folder.toUpperCase()}</div>`;
      return div;
    }

    /* ── 导航设置 ──────────────────────────────── */

    function setupNav(folders, idx) {
      const total = folders.length;
      const pos   = idx + 1;

      // 进度条
      document.getElementById('prog-fill').style.width  = `${(pos / total) * 100}%`;
      document.getElementById('prog-label').textContent = `CH.${zeroPad(pos)} / ${zeroPad(total)}`;

      const navUp   = document.getElementById('nav-up');
      const navDown = document.getElementById('nav-down');

      if (idx > 0) {
        const prevFolder = folders[idx - 1];
        navUp.classList.remove('disabled');
        navUp.href = `reader.html?ch=${prevFolder}`;
      }

      if (idx < total - 1) {
        const nextFolder = folders[idx + 1];
        navDown.classList.remove('disabled');
        navDown.href = `reader.html?ch=${nextFolder}`;
      }
    }

    /* ── 底部导航 ──────────────────────────────── */

    async function setupFooter(folders, idx) {
      const total = folders.length;

      document.getElementById('foot-pos').textContent =
        `${String(idx + 1).padStart(2, '0')} / ${String(total).padStart(2, '0')}`;

      // 上一章
      if (idx > 0) {
        const pf = folders[idx - 1];
        let pTitle = pf;
        try {
          const r = await fetch(`${ROOT}${pf}/meta.json`);
          const m = await r.json();
          pTitle = m.title || pf;
        } catch (_) {}
        const btn = document.getElementById('foot-prev');
        btn.classList.remove('disabled');
        btn.href = `reader.html?ch=${pf}`;
        document.getElementById('foot-prev-title').textContent = pTitle;
      }

      // 下一章
      if (idx < total - 1) {
        const nf = folders[idx + 1];
        let nTitle = nf;
        try {
          const r = await fetch(`${ROOT}${nf}/meta.json`);
          const m = await r.json();
          nTitle = m.title || nf;
        } catch (_) {}
        const btn = document.getElementById('foot-next');
        btn.classList.remove('disabled');
        btn.href = `reader.html?ch=${nf}`;
        document.getElementById('foot-next-title').textContent = nTitle;
      }
    }

    /* ── 深潜：滚动到正文 ──────────────────────── */

    window.diveIn = function () {
      document.getElementById('r-content').scrollIntoView({ behavior: 'smooth' });
    };

    /* ── 主加载流程 ────────────────────────────── */

    async function init() {
      const folder = getParam('ch');

      if (!folder) {
        showError('未指定章节参数 (?ch=ch1)');
        return;
      }

      try {
        /* 1. 读取章节目录 */
        const idxRes = await fetch(`${ROOT}index.json`);
        const folders = await idxRes.json();
        const idx = folders.indexOf(folder);

        if (idx === -1) {
          showError(`章节「${folder}」不在目录中`);
          return;
        }

        /* 2. 读取 meta + 正文 */
        const [metaRes, txtRes] = await Promise.all([
          fetch(`${ROOT}${folder}/meta.json`),
          fetch(`${ROOT}${folder}/${folder}.txt`)
        ]);

        const meta = await metaRes.json();
        const txt  = await txtRes.text();

        /* 3. 统计字数 */
        const wordCount = countChars(txt);

        /* 4. 更新页面标题 */
        document.title = `${meta.title || folder} · 无限理想乡`;

        /* 5. 填充扉页 */
        const numStr = zeroPad(idx + 1);
        document.getElementById('sp-num').textContent   = numStr;
        document.getElementById('sp-title').textContent = meta.title || folder;
        document.getElementById('sp-synopsis').textContent = meta.synopsis || '';

        // meta 信息格
        const metaEl = document.getElementById('sp-meta');
        metaEl.innerHTML =
          metaItem('WORDS', fmtWords(wordCount)) +
          metaItem('DATE',  meta.date || '—') +
          metaItem('STATUS', '连载中') +
          (meta.arc ? metaItem('ARC', meta.arc) : '');

        /* 6. 插画 */
        renderIllus(folder, meta);

        /* 7. 正文区 */
        const ctNum = document.getElementById('ct-num');
        ctNum.textContent = `// ${numStr}`;
        document.getElementById('ct-title').textContent = meta.title || folder;
        document.getElementById('r-text-body').innerHTML = Markup.parse(txt);

        /* 8. 导航 */
        setupNav(folders, idx);
        await setupFooter(folders, idx);

        /* 9. 显示页面 */
        document.getElementById('r-loading').style.display = 'none';
        document.getElementById('r-splash').style.display  = '';
        document.getElementById('r-content').style.display = '';

      } catch (err) {
        console.error('[Reader]', err);
        showError('章节加载失败，请检查文件是否存在');
      }
    }

    function showError(msg) {
      const loading = document.getElementById('r-loading');
      loading.innerHTML = `<div class="r-error">${msg}</div>`;
    }

    Cursor.init();
    init();

  })();
  </script>

</body>
