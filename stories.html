<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>浅渊残响 — 衍生故事</title>

  <!-- 字体 -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;500&family=Share+Tech+Mono&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

  <!-- 全局样式（导航、颜色变量、基础组件） -->
  <link rel="stylesheet" href="css/main.css">

  <style>
    /* ── 当前页导航高亮 ── */
    .nav-active {
      color: var(--cyan) !important;
    }
    .nav-active::after {
      transform: scaleX(1) !important;
    }

    /* ── Hero ── */
    .s-hero {
      padding: 96px 52px 40px;   /* top = 58px nav + 38px 间距 */
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 2;
    }
    .s-hero-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      color: var(--cyan);
      opacity: 0.7;
      margin-bottom: 18px;
    }
    .s-hero-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 0.12em;
      margin-bottom: 16px;
    }
    .s-hero-title em {
      color: var(--cyan);
      font-style: normal;
      font-weight: 600;
    }
    .s-hero-desc {
      font-size: 13px;
      line-height: 1.9;
      color: var(--text3);
      border-left: 2px solid rgba(91, 200, 232, 0.25);
      padding-left: 16px;
      max-width: 480px;
      margin-bottom: 28px;
    }

    /* ── 排序栏 ── */
    .sort-bar {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sort-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.12em;
      color: var(--text3);
      margin-right: 8px;
    }
    .sort-btn {
      padding: 6px 18px;
      border: 1px solid var(--border);
      background: transparent;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--text3);
      cursor: none;
      transition: all 0.2s;
    }
    .sort-btn.active {
      border-color: rgba(91, 200, 232, 0.35);
      background: rgba(91, 200, 232, 0.06);
      color: var(--cyan);
    }
    .sort-btn:hover:not(.active) {
      color: var(--text2);
      border-color: rgba(74, 144, 217, 0.28);
    }

    /* ── 统计栏 ── */
    .s-stats {
      display: flex;
      gap: 32px;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .s-stat-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .s-stat-key {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      color: var(--text3);
    }
    .s-stat-val {
      font-size: 22px;
      color: var(--text);
      font-weight: 300;
    }
    .s-stat-val em {
      color: var(--cyan);
      font-style: normal;
    }

    /* ── 主内容区 ── */
    .s-main {
      padding: 40px 52px 72px;
      position: relative;
      z-index: 2;
    }
    .s-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      background: var(--border);
    }

    /* ── 卡片 ── */
    .story-card-full {
      background: var(--bg1);
      padding: 30px 34px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      transition: background 0.25s;
      cursor: none;
      text-decoration: none;
      color: inherit;
    }
    .story-card-full::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: #A8E8FF;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.36s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .story-card-full:hover {
      background: rgba(10, 21, 37, 0.85);
    }
    .story-card-full:hover::after {
      transform: scaleX(1);
    }
    .story-card-full:hover .scf-arrow {
      transform: translateX(4px);
      color: #A8E8FF;
    }

    .scf-num {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.16em;
      color: var(--text3);
      margin-bottom: 16px;
    }
    .scf-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.06em;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    .scf-synopsis {
      font-family: 'Noto Serif SC', serif;
      font-size: 13px;
      line-height: 2;
      color: var(--text2);
      flex: 1;
      margin-bottom: 22px;
    }
    .scf-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .scf-meta-group {
      display: flex;
      gap: 24px;
    }
    .scf-meta-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .scf-meta-key {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.14em;
      color: var(--text3);
    }
    .scf-meta-val {
      font-size: 12px;
      color: var(--text2);
    }
    .scf-arrow {
      font-size: 18px;
      color: var(--text3);
      transition: transform 0.2s, color 0.2s;
      align-self: flex-end;
    }
    .scf-bg-num {
      position: absolute;
      right: 18px;
      bottom: 14px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 68px;
      font-weight: 700;
      color: rgba(74, 144, 217, 0.04);
      user-select: none;
      pointer-events: none;
      line-height: 1;
    }
  </style>
</head>
<body>

  <!-- ═══════════ 几何光标 ═══════════ -->
  <div id="cursor-container">
    <svg id="cur-ring" viewBox="0 0 50 50">
      <g fill="none" stroke="var(--cyan)" stroke-width="1.5" stroke-linecap="round">
        <path d="M 25 5 L 19 15 M 25 5 L 31 15" />
        <path d="M 7 36 L 13 26 M 7 36 L 19 36" />
        <path d="M 43 36 L 37 26 M 43 36 L 31 36" />
      </g>
    </svg>
    <svg id="cur" viewBox="0 0 50 50">
      <g fill="none" stroke="var(--cyan)" stroke-width="2" stroke-linecap="round">
        <path d="M 25 36 L 25 26" />
        <path d="M 16 20.5 L 25 26" />
        <path d="M 34 20.5 L 25 26" />
        <circle cx="25" cy="26" r="1" fill="var(--cyan)" stroke="none" />
      </g>
    </svg>
  </div>

  <!-- ═══════════ 导航栏 ═══════════ -->
  <nav>
    <a href="index.html" class="nav-logo">
      <span class="nav-logo-main">无限理想乡</span>
      <span class="nav-logo-sub">Creative Universe</span>
    </a>
    <ul class="nav-links">
      <li><a href="novel.html">主线小说</a></li>
      <li><a href="index.html" class="nav-active">深度重置</a></li>
      <li><a href="#">插画</a></li>
      <li><a href="#">世界观</a></li>
    </ul>
    <div class="nav-status">持续连载中</div>
  </nav>

  <!-- ═══════════ Hero ═══════════ -->
  <div class="s-hero">
    <div class="s-hero-tag">── SIDE STORIES · 衍生故事</div>
    <h1 class="s-hero-title">浅渊<em>残响</em></h1>
    <p class="s-hero-desc">与主线平行或相交的独立故事，每一篇都是「无限理想乡」宇宙中某个角落的光与回声。</p>

    <div class="sort-bar">
      <span class="sort-label">排序方式</span>
      <button class="sort-btn active" data-sort="name">名称 A→Z</button>
      <button class="sort-btn" data-sort="date">最新更新</button>
      <button class="sort-btn" data-sort="words">字数</button>
    </div>

    <div class="s-stats">
      <div class="s-stat-item">
        <span class="s-stat-key">故事总数</span>
        <span class="s-stat-val" id="stat-total">—</span>
      </div>
      <div class="s-stat-item">
        <span class="s-stat-key">累计字数</span>
        <span class="s-stat-val" id="stat-words">—</span>
      </div>
      <div class="s-stat-item">
        <span class="s-stat-key">最近更新</span>
        <span class="s-stat-val" id="stat-latest">—</span>
      </div>
    </div>
  </div>

  <!-- ═══════════ 卡片网格 ═══════════ -->
  <div class="s-main">
    <div class="s-grid" id="stories-grid">
      <!-- 由 stories.js 动态填充 -->
    </div>
  </div>

  <!-- ═══════════ 页脚 ═══════════ -->
  <footer>
    <div class="footer-logo">无限理想乡</div>
    <div class="footer-info">© 2026 · <em>vigill357</em> · 保留所有权利</div>
    <div class="footer-info">衍生故事 · <em>浅渊残响</em></div>
  </footer>

  <script src="js/cursor.js"></script>
  <script src="js/stories.js"></script>

</body>
</html>
